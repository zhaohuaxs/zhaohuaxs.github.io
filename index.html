<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <style>
        /* 全局字体与背景 */
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f8ff;
            color: #2a2a72;
        }

        /* 顶部导航栏 */
        nav {
            background-color: #a6e1fa;
            padding: 1rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        nav .text-xl {
            color: #ff69b4;
            text-shadow: 2px 2px 0 #ffffff;
        }

        nav a {
            color: #2a2a72;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
        }

        nav a img {
            width: 20px;
            height: 20px;
            margin-right: 5px;
        }

        nav a.active {
            color: #ff69b4;
        }

        nav a:hover {
            color: #ff69b4;
        }

        /* 主内容区域 */
        main {
            padding: 2rem;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.3);
        }

        .main-bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://upload-bbs.miyoushe.com/upload/2024/10/19/312784818/c0fabcee407d7eb45a9b8579589e8bd5_4072079007955827005.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(10px);
            opacity: 0.95;
            z-index: -1;
        }

        main h1 {
            font-size: 3rem;
            color: #ff69b4;
            text-shadow: 3px 3px 0 #ffffff;
        }

        main h2 {
            font-size: 1.5rem;
            color: #2a2a72;
            margin-bottom: 2rem;
        }

        .btn {
            background-color: #ff69b4;
            color: #ffffff;
            border-radius: 20px;
            padding: 0.8rem 2rem;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            background-color: #ff1493;
        }

        /* 图片展示 */
        .grid img {
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .grid img:hover {
            transform: scale(1.05);
        }

        /* 常见问题区域 */
        section {
            padding: 2rem;
        }

        section h2 {
            font-size: 2rem;
            color: #ff69b4;
            text-shadow: 2px 2px 0 #ffffff;
        }

        .question {
            cursor: pointer;
            background-color: #a6e1fa;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            transition: background-color 0.3s ease;
        }

        .question:hover {
            background-color: #87cefa;
        }

        .answer {
            display: none;
            background-color: #ffffff;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        /* 底部区域 */
        footer {
            background-color: #a6e1fa;
            padding: 1rem;
            box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.1);
        }

        footer p {
            color: #2a2a72;
        }

        footer a {
            color: #ff69b4;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #ff1493;
        }

        /* 手机端汉堡菜单 */
        #mobile-menu {
            margin-top: 10px;
            border-radius: 10px;
        }

        #mobile-menu a {
            justify-content: flex-start;
        }
    </style>
    <title>Android端弹幕编辑下载工具</title>
</head>

<body>
<!-- 顶部导航栏 -->
<nav>
    <div class="container mx-auto flex justify-between items-center">
        <div class="text-xl font-bold">LingCiApp</div>
        <div class="hidden md:flex space-x-4 nav-btn">
            <a href="#" class="active">
                <img src="./icon/ic_dm.webp" alt="弹目APP 图标">
                弹目APP
            </a>
            <a href="dy-like.html">
                <img src="./icon/ic_dy.webp" alt="DyLike-Player 图标">
                DyLike - Player
            </a>
            <a href="nav.html" target="_blank">导航</a>
        </div>
        <div class="md:hidden">
            <button id="menu-toggle" class="text-gray-600 focus:outline-none">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </div>
    <div id="mobile-menu" class="hidden md:hidden bg-gray-100 p-4">
        <a href="#" class="active py-2 hover:underline">
            <img src="./icon/ic_dm.webp" alt="弹目APP 图标">
            弹目APP
        </a>
        <a href="./dy-like.html" class=" py-2 hover:underline">
            <img src="./icon/ic_dy.webp" alt="DyLike-Player 图标">
            DyLike-Player
        </a>
        <a href="./nav.html" target="_blank" class="block py-2 hover:underline">导航</a>
    </div>
</nav>

<!-- 主内容区域 -->
<main class="container mx-auto text-center">
    <div class="main-bg-pattern"></div>
    <h1>Android端弹幕编辑工具</h1>
    <h2>自定义编辑本地弹幕文件，合并、分割、修改、调色，更多。</h2>
    <div class="flex flex-col md:flex-row justify-center space-y-4 md:space-y-0 md:space-x-4 mb-8">
        <a href="https://dm.ihappyc.eu.org:10520/d/guest/release/%E5%BC%B9%E7%9B%AE-armv8-release.apk" target="_blank" class="btn">下载尝试</a>
        <a href="./dy-like.html" class="btn">配套播放器</a>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <img src="./image/img_home.webp"
             alt="App 展示图片">
        <img src="./image/img_color.webp"
             alt="App 展示图片">
        <img src="./image/img_preview.webp"
             alt="App 展示图片">
    </div>
</main>

<!-- 常见问题区域 -->
<section class="container mx-auto">
    <h2>常见问题解答</h2>
    <div class="border border-gray-300 rounded-md p-4">
        <div class="question mb-2" onclick="toggleAnswer(1)">
            <h3 class="text-lg font-semibold">是否支持别的平台？</h3>
        </div>
        <div id="answer-1" class="answer mb-4">
            <p>仅 Android 平台</p>
        </div>
        <div class="question mb-2" onclick="toggleAnswer(2)">
            <h3 class="text-lg font-semibold">弹幕描边渐变调色有什么播放器可以支持</h3>
        </div>
        <div id="answer-2" class="answer mb-4">
            <p>目前仅配套开发的 DyLike 支持渐变描边，同样仅支持 Android 平台</p>
        </div>
        <div class="question" onclick="toggleAnswer(3)">
            <h3 class="text-lg font-semibold">我有很多问题想要反馈，去哪？</h3>
        </div>
        <div id="answer-3" class="answer">
            <p>有的有的，扣扣群：1009874377</p>
        </div>
    </div>
</section>

<!-- 底部区域 -->
<footer class="text-center">
    <p>享受弹幕的乐趣。</p>
    <div class="flex flex-col md:flex-row justify-center space-y-2 md:space-y-0 md:space-x-4 mt-2">
        <a href="https://danmubox.github.io" target="_blank" class="hover:underline">弹幕盒子</a>
        <a href="https://github.com/zhaohuaxs" target="_blank" class="hover:underline">Github</a>
    </div>
    <p class="mt-4">© 2025 ZhaoHuaXS 版权所有</p>
</footer>

<script>
    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');

    menuToggle.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
    });

    function toggleAnswer(id) {
        const answer = document.getElementById(`answer-${id}`);
        answer.classList.toggle('display');
        answer.style.display = answer.style.display === 'block' ? 'none' : 'block';
    }
</script>
</body>

</html>
