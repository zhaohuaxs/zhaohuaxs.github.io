<!DOCTYPE html>
<html>

<head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" referrerpolicy="no-referrer"></script>

<body>
    <div id="dplayer" style="width: 80%; margin: auto;"></div>
    <script>
        const dp = new DPlayer({
            container: document.getElementById('dplayer'),
            autoplay: false,
            theme: '#FADFA3',
            live: false,
            loop: true,
            lang: 'zh-cn',
            screenshot: false,
            hotkey: true,
            preload: 'auto',
            logo: 'https://gitlab.com/xxll/static-file/-/raw/main/image/doge.png',
            volume: 0.7,
            mutex: true,
            video: {
                url: './rec/1_hello_world.m3u8',
                pic: '',
                thumbnails: '',
                type: 'auto',
            },
            subtitle: {
                url: './',
                type: 'webvtt',
                fontSize: '25px',
                bottom: '10%',
                color: '#b7daff',
            },
            danmaku: {
                id: 'zhxs',
                api: './dm/zhxs.json?v=',
                token: 'zhxs',
                maximum: 1000,
                addition: [],
                user: 'zhxs',
                bottom: '15%',
                unlimited: true,
            },
            contextmenu: [
                {
                    text: '没啥事不要点',
                    click: (player) => {
                        console.log(player);
                    },
                },
            ],
            highlight: [
                {
                    time: 17,
                    text: '这是短暂的循环',
                }
            ],
        });

    <span style="display: none;"></span>
